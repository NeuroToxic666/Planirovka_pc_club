<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <!-- ИСПРАВИЛ: правильная ссылка на скрипт ТГ -->
    <script src="https://telegram.org"></script>
    <style>
        * { user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; overflow-x: hidden; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #0ff; text-shadow: 0 0 10px #0ff; text-transform: uppercase; font-size: 20px; }
        .map { display: grid; grid-template-columns: repeat(9, 35px); grid-template-rows: repeat(9, 35px); gap: 8px; padding: 20px; position: relative; }
        .pc { border: 2px solid #4a0082; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: 0.3s; cursor: pointer; background: #000; z-index: 2; }
        .pc:active { transform: scale(0.9); border-color: #0ff; }
        .vip { border-color: #9400d3; color: #9400d3; }
        
        /* Стены и вход */
        .wall-v-top { grid-column: 6; grid-row: 1 / 6; border-left: 2px solid #fff; pointer-events: none; }
        .wall-h-bottom { grid-row: 7; grid-column: 4 / 9; border-top: 2px solid #fff; pointer-events: none; }
        .entry { grid-row: 7; grid-column: 1 / 4; color: #444; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* Колонки (как в твоем FastAPI) */
        .c1 { grid-column: 1; } .c3 { grid-column: 3; } .c4 { grid-column: 4; } .c8 { grid-column: 8; }

        /* Модалка */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 2px solid #0ff; border-radius: 15px; padding: 20px; width: 80%; text-align: center; box-shadow: 0 0 20px #0ff; }
        .btn-tariffs { display: block; width: 100%; padding: 12px; margin: 10px 0; background: #0ff; color: #000; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; }
        .btn-close { color: #555; font-size: 14px; margin-top: 10px; text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Выбор компьютера</h1>
    <div class="map" id="map-container">
        <!-- Сюда JS вставит компы -->
        <div class="wall-v-top"></div>
        <div class="wall-h-bottom"></div>
        <div class="entry">ВХОД</div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title" style="color: #0ff;">ПК №</h2>
            <p>Выберите тариф:</p>
            <button class="btn-tariffs" onclick="selectTariff(100)">1 час — 100₽</button>
            <button class="btn-tariffs" onclick="selectTariff(250)">3 часа — 250₽</button>
            <div class="btn-close" onclick="closeBooking()">Отмена</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const map = document.getElementById('map-container');
        const modal = document.getElementById('modal-overlay');
        const title = document.getElementById('modal-title');
        let selectedPcId = null;

        // Генерация данных (копия твоего Python цикла)
        const pcs = [
            {id: 1, c: 1, r: 1}, {id: 2, c: 1, r: 2}, {id: 3, c: 1, r: 3}, {id: 4, c: 1, r: 4}, {id: 5, c: 1, r: 5}
        ];
        for(let i=0; i<5; i++) {
            pcs.push({id: 6+i, c: 3, r: i+1}, {id: 11+i, c: 4, r: i+1});
        }
        for(let i=0; i<5; i++) {
            pcs.push({id: 'V'+(i+1), c: 8, r: i+1, type: 'vip'});
        }

        // Отрисовка на карте
        pcs.forEach(pc => {
            const div = document.createElement('div');
            div.className = `pc c${pc.c} ${pc.type || ''}`;
            div.style.gridRow = pc.r;
            div.innerText = pc.id;
            div.onclick = () => openBooking(pc.id);
            map.appendChild(div);
        });

        function openBooking(id) {
            selectedPcId = id;
            title.innerText = 'ПК №' + id;
            modal.style.display = 'flex';
        }

        function closeBooking() { modal.style.display = 'none'; }

        function selectTariff(price) {
            const data = { pc: selectedPcId, price: price, status: "booked" };
            tg.sendData(JSON.stringify(data)); // Отправка боту
            tg.close();
        }
    </script>
</body>
</html>
