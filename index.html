<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #0ff; text-shadow: 0 0 10px #0ff; text-transform: uppercase; font-size: 1.2rem; }
        
        /* Сетка */
        .map { display: grid; grid-template-columns: repeat(9, 32px); grid-template-rows: repeat(7, 32px); gap: 8px; padding: 10px; margin-top: 20px; }
        
        /* Общий стиль ПК */
        .pc { border: 2px solid #4a0082; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; background: #111; z-index: 5; }
        .pc:active { transform: scale(0.9); border-color: #0ff; }
        .vip { border-color: #9400d3; color: #9400d3; font-weight: bold; }

        /* Колонки */
        .c1 { grid-column: 1; } .c3 { grid-column: 3; } .c4 { grid-column: 4; } .c8 { grid-column: 8; }

        /* Стены */
        .wall-v { grid-column: 6; grid-row: 1 / 6; border-left: 2px solid #333; }
        .wall-h { grid-row: 7; grid-column: 4 / 9; border-top: 2px solid #333; }
        .entry { grid-row: 7; grid-column: 1 / 3; color: #555; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; font-size: 9px; }

        /* Модалка */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 2px solid #0ff; border-radius: 15px; padding: 25px; width: 280px; z-index: 10000; text-align: center; }
        .btn-t { display: block; width: 100%; padding: 12px; margin: 10px 0; background: #0ff; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .btn-close { margin-top: 15px; color: #777; text-decoration: underline; font-size: 13px; }
        .wall-v, .wall-h, .entry { 
    pointer-events: none; 
        }
        
    </style>
</head>
<body>

    <h1>Выбор компьютера</h1>

    <div class="map">
        <!-- Левый ряд -->
        <div class="pc c1" style="grid-row: 1" onclick="openModal('1')">1</div>
        <div class="pc c1" style="grid-row: 2" onclick="openModal('2')">2</div>
        <div class="pc c1" style="grid-row: 3" onclick="openModal('3')">3</div>
        <div class="pc c1" style="grid-row: 4" onclick="openModal('4')">4</div>
        <div class="pc c1" style="grid-row: 5" onclick="openModal('5')">5</div>

        <!-- Центральный левый ряд -->
        <div class="pc c3" style="grid-row: 1" onclick="openModal('6')">6</div>
        <div class="pc c3" style="grid-row: 2" onclick="openModal('7')">7</div>
        <div class="pc c3" style="grid-row: 3" onclick="openModal('8')">8</div>
        <div class="pc c3" style="grid-row: 4" onclick="openModal('9')">9</div>
        <div class="pc c3" style="grid-row: 5" onclick="openModal('10')">10</div>

        <!-- Центральный правый ряд -->
        <div class="pc c4" style="grid-row: 1" onclick="openModal('11')">11</div>
        <div class="pc c4" style="grid-row: 2" onclick="openModal('12')">12</div>
        <div class="pc c4" style="grid-row: 3" onclick="openModal('13')">13</div>
        <div class="pc c4" style="grid-row: 4" onclick="openModal('14')">14</div>
        <div class="pc c4" style="grid-row: 5" onclick="openModal('15')">15</div>

        <!-- VIP ряд -->
        <div class="pc vip c8" style="grid-row: 1" onclick="openModal('V1')">V1</div>
        <div class="pc vip c8" style="grid-row: 2" onclick="openModal('V2')">V2</div>
        <div class="pc vip c8" style="grid-row: 3" onclick="openModal('V3')">V3</div>
        <div class="pc vip c8" style="grid-row: 4" onclick="openModal('V4')">V4</div>
        <div class="pc vip c8" style="grid-row: 5" onclick="openModal('V5')">V5</div>

        <div class="wall-v"></div>
        <div class="wall-h"></div>
        <div class="entry">ВХОД</div>
    </div>

    <!-- Модальное окно -->
    <div id="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title" style="color: #0ff; margin-top: 0;">ПК</h2>
            <button class="btn-t" onclick="selectTariff(100, '1 час')">1 час — 100₽</button>
            <button class="btn-t" onclick="selectTariff(250, '3 часа')">3 часа — 250₽</button>
            <button class="btn-t" onclick="selectTariff(500, 'Сутки')">Сутки — 500₽</button>
            <div class="btn-close" onclick="closeModal()">Отмена</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let selectedId = null;

        function openModal(id) {
            
            selectedId = id
            document.getElementById('modal-title').innerText = 'ПК №' + id;
            document.getElementById('modal-overlay').style.display = 'flex';
            
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function selectTariff(price, label) {
            const data = {
                pc: selectedId,
                tariff: label,
                price: price
            };
            // Отправляем JSON боту
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
    </html>
